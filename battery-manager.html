<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>充電電池管理</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="電池管理"/>
  <style>
    :root{
      --bg:     #f2f6f0;
      --bg2:    #e6ede8;
      --card:   #ffffff;
      --border: #d4e3d6;
      --aa:     #5b8a6f;
      --aaa:    #6a9dbf;
      --dark:   #2e3d35;
      --mid:    #4a6355;
      --sub:    #85a893;
      --faint:  #b8cfc0;
      --danger: #b86a5a;
      --ok:     #5b8a6f;
      --empty:  #c07a55;
      --rechg:  #7a6fbf;  /* 充電電池：紫藍 */
      --normal: #bf9a4a;  /* 一般電池：暖金 */
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:'PingFang TC','Noto Sans TC',sans-serif;color:var(--dark);padding-bottom:80px}
    input,select,button{font-family:inherit}
    input::placeholder{color:var(--faint)}
    select option{background:#fff;color:var(--dark)}

    #header{background:var(--bg);padding:22px 18px 14px;position:sticky;top:0;z-index:10;border-bottom:1.5px solid var(--border)}
    #header h1{color:var(--dark);font-size:18px;font-weight:700;letter-spacing:.04em}
    #header p{color:var(--sub);font-size:11px;margin-top:3px}

    #tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);padding:0 4px}
    .tab{flex:1;padding:11px 2px;border:none;background:transparent;font-size:11.5px;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
    .tab.active{color:var(--aa);font-weight:700;border-bottom:2.5px solid var(--aa)}

    #content{padding:16px}
    .section-label{font-size:12px;color:var(--sub);margin-bottom:14px}

    .card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(70,110,80,.06)}

    /* 庫存區塊標題 */
    .inv-section-title{font-size:13px;font-weight:700;color:var(--dark);margin:18px 0 10px;display:flex;align-items:center;gap:6px}
    .inv-section-title:first-child{margin-top:0}
    .badge-rechg{background:rgba(122,111,191,.12);color:var(--rechg);border:1px solid rgba(122,111,191,.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
    .badge-normal{background:rgba(191,154,74,.12);color:var(--normal);border:1px solid rgba(191,154,74,.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}

    /* Overview */
    .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .card-left{display:flex;align-items:center;gap:12px}
    .bat-label{font-weight:700;font-size:15px;color:var(--dark)}
    .bat-sub{font-size:12px;color:var(--sub);margin-top:3px}
    .stock-num{font-size:22px;font-weight:800;text-align:right}
    .stock-unit{font-size:10px;color:var(--sub);text-align:right;margin-top:1px}
    .bar-bg{height:6px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-bottom:6px}
    .bar-fill{height:100%;border-radius:99px;transition:width .5s}
    .ov-row{display:flex;gap:8px;margin-bottom:8px}
    .ov-mini{flex:1;background:var(--bg);border-radius:10px;padding:8px 10px;border:1px solid var(--border)}
    .ov-mini-label{font-size:10px;color:var(--sub);margin-bottom:4px}
    .ov-mini-num{font-size:18px;font-weight:800}
    .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .tag-aa{background:rgba(91,138,111,.1);border:1px solid rgba(91,138,111,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--mid)}
    .tag-aaa{background:rgba(106,157,191,.1);border:1px solid rgba(106,157,191,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--mid)}
    .no-dev{font-size:12px;color:var(--faint)}

    /* Inventory controls */
    .inv-row{display:flex;align-items:center;justify-content:space-between}
    .inv-controls{display:flex;align-items:center;gap:10px}
    .btn-minus{width:34px;height:34px;border-radius:10px;border:1.5px solid rgba(184,106,90,.4);background:rgba(184,106,90,.08);color:var(--danger);font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
    .btn-plus{width:34px;height:34px;border-radius:10px;font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
    .btn-plus-aa{border:1.5px solid rgba(91,138,111,.4);background:rgba(91,138,111,.1);color:var(--aa)}
    .btn-plus-aaa{border:1.5px solid rgba(106,157,191,.4);background:rgba(106,157,191,.1);color:var(--aaa)}
    .inv-num{font-size:22px;font-weight:800;min-width:34px;text-align:center}

    /* Devices (庫存連動) */
    .dev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .dev-count{font-size:13px;color:var(--sub)}
    .add-btn{background:var(--aa);border:none;border-radius:10px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
    .dev-row{display:flex;align-items:center;justify-content:space-between}
    .dev-name{font-weight:700;font-size:15px;color:var(--dark)}
    .dev-type{font-size:12px;color:var(--sub);margin-top:2px}
    .dev-actions{display:flex;gap:6px}
    .icon-btn{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:15px;cursor:pointer}
    .empty{text-align:center;padding:48px 16px;color:var(--faint);font-size:14px}
    .empty-emoji{font-size:40px;margin-bottom:12px}

    /* 📋 裝置清單 */
    .list-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(70,110,80,.05)}
    .list-row{display:flex;align-items:center;gap:12px}
    .list-info{flex:1}
    .list-name{font-weight:700;font-size:15px;color:var(--dark)}
    .list-spec{font-size:12px;color:var(--sub);margin-top:2px}
    .status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;border:none}
    .status-ok{background:rgba(91,138,111,.12);color:var(--ok);border:1.5px solid rgba(91,138,111,.3)}
    .status-empty{background:rgba(192,122,85,.12);color:var(--empty);border:1.5px solid rgba(192,122,85,.3)}
    .list-actions{display:flex;gap:6px;margin-top:10px}
    .filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:12px;cursor:pointer}
    .filter-btn.active{background:var(--aa);color:#fff;border-color:var(--aa);font-weight:700}

    /* 電池種類選擇 */
    .type-row{display:flex;gap:8px;margin-top:10px}
    .type-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:13px;cursor:pointer;text-align:center}
    .type-btn.sel-rechg{background:rgba(122,111,191,.12);color:var(--rechg);border-color:var(--rechg);font-weight:700}
    .type-btn.sel-normal{background:rgba(191,154,74,.12);color:var(--normal);border-color:var(--normal);font-weight:700}

    /* Form */
    .form-label{font-size:12px;color:var(--sub);margin-bottom:6px}
    .emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .emoji-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:18px}
    .emoji-btn.sel{background:rgba(91,138,111,.15);border:1.5px solid var(--aa)}
    .input-field{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--dark);font-size:14px;outline:none;width:100%}
    .input-row{display:flex;gap:8px;margin-top:8px;align-items:center}
    .done-btn{margin-top:10px;padding:7px 22px;border-radius:10px;border:none;background:var(--aa);color:#fff;font-weight:700;font-size:13px;cursor:pointer}

    /* Modals */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,50,35,.3);z-index:50;align-items:flex-end}
    .modal-overlay.open{display:flex}
    .modal-box{background:#f7faf7;border-radius:22px 22px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;margin:0 auto;border:1.5px solid var(--border);box-shadow:0 -4px 24px rgba(70,110,80,.12)}
    .modal-box h2{font-size:17px;color:var(--dark);margin-bottom:16px;font-weight:700}
    .modal-row{display:flex;gap:10px;margin-top:18px}
    .modal-cancel{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:14px;cursor:pointer}
    .modal-confirm{flex:2;padding:12px;border-radius:12px;border:none;background:var(--aa);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
  </style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:28px">🔋</span>
    <div>
      <h1>電池管理</h1>
      <p>Battery Manager</p>
    </div>
  </div>
</div>

<div id="tabs">
  <button class="tab active" onclick="switchTab('overview')">📊 總覽</button>
  <button class="tab" onclick="switchTab('list')">📋 清單</button>
  <button class="tab" onclick="switchTab('inventory')">🗃️ 庫存</button>
</div>

<div id="content"></div>

<!-- Modal：清單裝置 -->
<div id="modal-list" class="modal-overlay" onclick="closeModalOutside('modal-list',event)">
  <div class="modal-box">
    <h2 id="modal-list-title">新增裝置</h2>
    <div class="form-label">選擇圖示</div>
    <div class="emoji-grid" id="modal-list-icons"></div>
    <input class="input-field" id="modal-list-name" placeholder="裝置名稱（例：電視遙控器）"/>
    <div class="input-row">
      <select class="input-field" id="modal-list-size" style="flex:2;width:auto">
        <option value="AA">3號電池 (AA)</option>
        <option value="AAA">4號電池 (AAA)</option>
      </select>
      <input type="number" min="1" max="20" class="input-field" id="modal-list-count" value="1" style="flex:1;width:auto"/>
      <span style="color:var(--sub);font-size:13px">顆</span>
    </div>
    <!-- 一般 / 充電 -->
    <div style="margin-top:12px">
      <div class="form-label">電池種類</div>
      <div class="type-row">
        <button id="modal-list-rechg" class="type-btn sel-rechg" onclick="selectListKind('rechargeable')">⚡ 充電電池</button>
        <button id="modal-list-normal" class="type-btn" onclick="selectListKind('normal')">🔋 一般電池</button>
      </div>
    </div>
    <!-- 狀態 -->
    <div style="margin-top:12px">
      <div class="form-label">目前狀態</div>
      <div style="display:flex;gap:8px">
        <button id="list-status-ok" class="status-badge status-ok" style="flex:1;padding:10px" onclick="selectListStatus('ok')">✅ 已裝電池</button>
        <button id="list-status-empty" class="status-badge status-empty" style="flex:1;padding:10px;opacity:.4" onclick="selectListStatus('empty')">🪫 沒有電池</button>
      </div>
    </div>
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal('modal-list')">取消</button>
      <button class="modal-confirm" onclick="confirmListAdd()">儲存</button>
    </div>
  </div>
</div>

<script>
const ICONS=['📱','🎮','🔦','⌨️','🖱️','🎵','📷','⏰','🔔','🪣','🎯','🚗','💡','🎲','📡'];
const SIZE_COLORS={AA:'#5b8a6f',AAA:'#6a9dbf'};
const SIZE_LABELS={AA:'3號 (AA)',AAA:'4號 (AAA)'};
const KIND_LABEL={rechargeable:'⚡ 充電',normal:'🔋 一般'};
const KIND_COLOR={rechargeable:'#7a6fbf',normal:'#bf9a4a'};

let currentTab='overview';
let listEditingId=null;
let listFilter='all';
let modalListIcon='📱';
let modalListKind='rechargeable';
let modalListStatus='ok';
let modalListEditId=null;

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// 庫存：{ AA_rechargeable, AA_normal, AAA_rechargeable, AAA_normal }
let inventory=load('battery_inv2',{AA_rechargeable:0,AA_normal:0,AAA_rechargeable:0,AAA_normal:0});
// 裝置清單：{ id, name, icon, size(AA/AAA), count, kind(rechargeable/normal), status(ok/empty) }
let devList=load('battery_devlist2',[]);

function batteryIcon(size,size_px){
  size_px=size_px||32;
  const color=SIZE_COLORS[size];
  const isSmall=size==='AAA';
  const w=isSmall?16:18, h=isSmall?size_px*.85:size_px*.75;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none">
    <rect x="0" y="4" width="${w}" height="${h-4}" rx="3" fill="${color}" opacity=".15" stroke="${color}" stroke-width="1.8"/>
    <rect x="${w/2-4}" y="0" width="8" height="5" rx="1" fill="${color}"/>
    <rect x="3" y="${h*.35}" width="${w-6}" height="${h*.3}" rx="1.5" fill="${color}" opacity=".65"/>
  </svg>`;
}

// ── RENDER ──
function render(){
  const c=document.getElementById('content');
  if(currentTab==='overview')       c.innerHTML=renderOverview();
  else if(currentTab==='inventory') c.innerHTML=renderInventory();
  else                               c.innerHTML=renderList();
}

function renderOverview(){
  let html='<div class="section-label">各型號庫存概況</div>';
  ['AA','AAA'].forEach(size=>{
    const r=inventory[size+'_rechargeable']||0;
    const n=inventory[size+'_normal']||0;
    const color=SIZE_COLORS[size];
    // devices using this size from devList
    const using=devList.filter(d=>d.size===size);
    const tagHtml=using.length
      ?using.map(d=>`<span class="tag-${size.toLowerCase()}">${d.icon} ${escHtml(d.name)} ×${d.count}</span>`).join('')
      :'<span class="no-dev">清單中無裝置使用此型號</span>';
    html+=`<div class="card">
      <div class="card-top">
        <div class="card-left">
          ${batteryIcon(size,38)}
          <div><div class="bat-label">${size==='AA'?'3號電池 (AA)':'4號電池 (AAA)'}</div></div>
        </div>
      </div>
      <div class="ov-row">
        <div class="ov-mini">
          <div class="ov-mini-label" style="color:#7a6fbf">⚡ 充電電池</div>
          <div class="ov-mini-num" style="color:${r===0?'var(--danger)':'#7a6fbf'}">${r}</div>
          <div style="font-size:10px;color:var(--sub)">顆</div>
        </div>
        <div class="ov-mini">
          <div class="ov-mini-label" style="color:#bf9a4a">🔋 一般電池</div>
          <div class="ov-mini-num" style="color:${n===0?'var(--danger)':'#bf9a4a'}">${n}</div>
          <div style="font-size:10px;color:var(--sub)">顆</div>
        </div>
      </div>
      <div class="tags">${tagHtml}</div>
    </div>`;
  });
  return html;
}

function renderInventory(){
  let html='';
  // 充電電池
  html+=`<div class="inv-section-title"><span class="badge-rechg">⚡ 充電電池</span></div>`;
  ['AA','AAA'].forEach(size=>{
    const key=size+'_rechargeable';
    const color=SIZE_COLORS[size];
    html+=`<div class="card">
      <div class="inv-row">
        <div class="card-left">
          ${batteryIcon(size,40)}
          <div class="bat-label">${size==='AA'?'3號 (AA)':'4號 (AAA)'}</div>
        </div>
        <div class="inv-controls">
          <button class="btn-minus" onclick="changeInv('${key}',-1)">−</button>
          <span class="inv-num" style="color:#7a6fbf">${inventory[key]||0}</span>
          <button class="btn-plus" style="border:1.5px solid rgba(122,111,191,.4);background:rgba(122,111,191,.1);color:#7a6fbf" onclick="changeInv('${key}',1)">+</button>
        </div>
      </div>
    </div>`;
  });
  // 一般電池
  html+=`<div class="inv-section-title"><span class="badge-normal">🔋 一般電池</span></div>`;
  ['AA','AAA'].forEach(size=>{
    const key=size+'_normal';
    const color=SIZE_COLORS[size];
    html+=`<div class="card">
      <div class="inv-row">
        <div class="card-left">
          ${batteryIcon(size,40)}
          <div class="bat-label">${size==='AA'?'3號 (AA)':'4號 (AAA)'}</div>
        </div>
        <div class="inv-controls">
          <button class="btn-minus" onclick="changeInv('${key}',-1)">−</button>
          <span class="inv-num" style="color:#bf9a4a">${inventory[key]||0}</span>
          <button class="btn-plus" style="border:1.5px solid rgba(191,154,74,.4);background:rgba(191,154,74,.1);color:#bf9a4a" onclick="changeInv('${key}',1)">+</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function renderList(){
  const okCount=devList.filter(d=>d.status==='ok').length;
  const emptyCount=devList.filter(d=>d.status==='empty').length;
  let html=`<div class="dev-header">
    <span class="dev-count">${devList.length} 個裝置・<span style="color:var(--empty)">${emptyCount} 個沒電池</span></span>
    <button class="add-btn" onclick="openListModal()">＋ 新增</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn${listFilter==='all'?' active':''}" onclick="setFilter('all')">全部 ${devList.length}</button>
    <button class="filter-btn${listFilter==='ok'?' active':''}" onclick="setFilter('ok')">✅ 有電池 ${okCount}</button>
    <button class="filter-btn${listFilter==='empty'?' active':''}" onclick="setFilter('empty')">🪫 沒電池 ${emptyCount}</button>
  </div>`;

  const filtered=listFilter==='all'?devList:devList.filter(d=>d.status===listFilter);
  if(!filtered.length){
    html+=`<div class="empty"><div class="empty-emoji">${listFilter==='empty'?'🪫':'📋'}</div>${devList.length?'這個分類沒有裝置':'還沒有裝置，點右上角新增'}</div>`;
    return html;
  }

  filtered.forEach(d=>{
    const sizeColor=SIZE_COLORS[d.size];
    const kindColor=KIND_COLOR[d.kind];
    const isOk=d.status==='ok';
    if(listEditingId===d.id){
      const iconsHtml=ICONS.map(ic=>
        `<button class="emoji-btn${d.icon===ic?' sel':''}" onclick="setListIcon(${d.id},'${ic}')">${ic}</button>`
      ).join('');
      html+=`<div class="list-card">
        <div class="form-label">Emoji 圖示</div>
        <div class="emoji-grid">${iconsHtml}</div>
        <input class="input-field" value="${escHtml(d.name)}" placeholder="裝置名稱" oninput="updateList(${d.id},'name',this.value)"/>
        <div class="input-row">
          <select class="input-field" style="flex:2;width:auto" onchange="updateList(${d.id},'size',this.value)">
            <option value="AA"${d.size==='AA'?' selected':''}>3號電池 (AA)</option>
            <option value="AAA"${d.size==='AAA'?' selected':''}>4號電池 (AAA)</option>
          </select>
          <input type="number" min="1" max="20" class="input-field" value="${d.count}" style="flex:1;width:auto" oninput="updateList(${d.id},'count',parseInt(this.value)||1)"/>
          <span style="color:var(--sub);font-size:13px">顆</span>
        </div>
        <div style="margin-top:10px">
          <div class="form-label">電池種類</div>
          <div class="type-row">
            <button class="type-btn${d.kind==='rechargeable'?' sel-rechg':''}" onclick="updateList(${d.id},'kind','rechargeable');render()">⚡ 充電電池</button>
            <button class="type-btn${d.kind==='normal'?' sel-normal':''}" onclick="updateList(${d.id},'kind','normal');render()">🔋 一般電池</button>
          </div>
        </div>
        <div style="margin-top:10px">
          <div class="form-label">目前狀態</div>
          <div style="display:flex;gap:8px">
            <button class="status-badge status-ok" style="flex:1;padding:9px;opacity:${d.status==='ok'?1:.4}" onclick="updateList(${d.id},'status','ok');render()">✅ 已裝電池</button>
            <button class="status-badge status-empty" style="flex:1;padding:9px;opacity:${d.status==='empty'?1:.4}" onclick="updateList(${d.id},'status','empty');render()">🪫 沒有電池</button>
          </div>
        </div>
        <button class="done-btn" onclick="stopListEdit()">完成</button>
      </div>`;
    } else {
      html+=`<div class="list-card">
        <div class="list-row">
          <span style="font-size:26px">${d.icon}</span>
          <div class="list-info">
            <div class="list-name">${escHtml(d.name)}</div>
            <div class="list-spec">
              <span style="color:${sizeColor}">${SIZE_LABELS[d.size]}</span>
              × ${d.count} 顆・
              <span style="color:${kindColor}">${KIND_LABEL[d.kind]}</span>
            </div>
          </div>
          <button class="status-badge ${isOk?'status-ok':'status-empty'}" onclick="toggleStatus(${d.id})">${isOk?'✅ 有電池':'🪫 沒電池'}</button>
        </div>
        <div class="list-actions">
          <button class="icon-btn" onclick="startListEdit(${d.id})">✏️</button>
          <button class="icon-btn" onclick="removeListDev(${d.id})">🗑️</button>
        </div>
      </div>`;
    }
  });
  return html;
}

// ── ACTIONS ──
function switchTab(tab){
  currentTab=tab; listEditingId=null;
  document.querySelectorAll('.tab').forEach((btn,i)=>{
    btn.classList.toggle('active',['overview','list','inventory'][i]===tab);
  });
  render();
}
function setFilter(f){listFilter=f;render()}
function changeInv(key,delta){
  inventory[key]=Math.max(0,(inventory[key]||0)+delta);
  save('battery_inv2',inventory); render();
}
function startListEdit(id){listEditingId=id;render()}
function stopListEdit(){listEditingId=null;render()}
function updateList(id,field,val){
  devList=devList.map(d=>d.id===id?{...d,[field]:val}:d);
  save('battery_devlist2',devList);
}
function setListIcon(id,icon){
  devList=devList.map(d=>d.id===id?{...d,icon}:d);
  save('battery_devlist2',devList); render();
}
function removeListDev(id){
  devList=devList.filter(d=>d.id!==id);
  save('battery_devlist2',devList); render();
}
function toggleStatus(id){
  devList=devList.map(d=>d.id===id?{...d,status:d.status==='ok'?'empty':'ok'}:d);
  save('battery_devlist2',devList); render();
}

// ── MODAL ──
function closeModal(id){document.getElementById(id).classList.remove('open')}
function closeModalOutside(id,e){if(e.target===document.getElementById(id))closeModal(id)}

function openListModal(editId){
  modalListEditId=editId||null;
  modalListIcon='📱'; modalListKind='rechargeable'; modalListStatus='ok';
  if(editId){
    const d=devList.find(x=>x.id===editId);
    if(d){
      modalListIcon=d.icon; modalListKind=d.kind; modalListStatus=d.status;
      document.getElementById('modal-list-name').value=d.name;
      document.getElementById('modal-list-size').value=d.size;
      document.getElementById('modal-list-count').value=d.count;
      document.getElementById('modal-list-title').textContent='編輯裝置';
    }
  } else {
    document.getElementById('modal-list-name').value='';
    document.getElementById('modal-list-size').value='AA';
    document.getElementById('modal-list-count').value=1;
    document.getElementById('modal-list-title').textContent='新增裝置';
  }
  renderListModalIcons(); updateListKindBtns(); updateListStatusBtns();
  document.getElementById('modal-list').classList.add('open');
}
function renderListModalIcons(){
  document.getElementById('modal-list-icons').innerHTML=ICONS.map(ic=>
    `<button class="emoji-btn${modalListIcon===ic?' sel':''}" onclick="selectListIcon('${ic}')">${ic}</button>`
  ).join('');
}
function selectListIcon(ic){modalListIcon=ic;renderListModalIcons()}
function selectListKind(k){
  modalListKind=k; updateListKindBtns();
}
function updateListKindBtns(){
  document.getElementById('modal-list-rechg').className='type-btn'+(modalListKind==='rechargeable'?' sel-rechg':'');
  document.getElementById('modal-list-normal').className='type-btn'+(modalListKind==='normal'?' sel-normal':'');
}
function selectListStatus(s){modalListStatus=s;updateListStatusBtns()}
function updateListStatusBtns(){
  document.getElementById('list-status-ok').style.opacity=modalListStatus==='ok'?1:.4;
  document.getElementById('list-status-empty').style.opacity=modalListStatus==='empty'?1:.4;
}
function confirmListAdd(){
  const name=document.getElementById('modal-list-name').value.trim();
  if(!name)return;
  const item={
    id:modalListEditId||Date.now(), name,
    size:document.getElementById('modal-list-size').value,
    count:parseInt(document.getElementById('modal-list-count').value)||1,
    icon:modalListIcon, kind:modalListKind, status:modalListStatus
  };
  if(modalListEditId){
    devList=devList.map(d=>d.id===modalListEditId?item:d);
  } else {
    devList.push(item);
  }
  save('battery_devlist2',devList);
  closeModal('modal-list'); switchTab('list');
}

render();
</script>
</body>
</html>
