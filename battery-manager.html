<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>充電電池管理</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="電池管理"/>
  <style>
    /*
      文青配色：
      背景     #f2f6f0  淡苔綠白
      卡片     #ffffff
      Header   #5b8a6f  霧感森林綠
      主色AA   #5b8a6f  森林綠
      副色AAA  #7aa8c0  霧藍
      文字深   #2e3d35  深墨綠
      文字中   #5a7060  中綠灰
      文字淡   #9eb8a8  淡灰綠
      邊框     #d6e6d8  淡綠邊
      警示     #c07a6a  磚紅
    */
    :root{
      --bg:     #f2f6f0;
      --bg2:    #e6ede8;
      --card:   #ffffff;
      --border: #d4e3d6;
      --h1:     #1e3d2e;   /* header深綠 */
      --h2:     #2e5c42;   /* header淺 */
      --aa:     #5b8a6f;   /* 3號 森林綠 */
      --aaa:    #6a9dbf;   /* 4號 霧藍 */
      --dark:   #2e3d35;   /* 深文字 */
      --mid:    #4a6355;   /* 中文字 */
      --sub:    #85a893;   /* 淡文字 */
      --faint:  #b8cfc0;   /* 很淡 */
      --danger: #b86a5a;   /* 磚紅 */
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:'PingFang TC','Noto Sans TC',sans-serif;color:var(--dark);padding-bottom:80px}
    input,select,button{font-family:inherit}
    input::placeholder{color:var(--faint)}
    select option{background:#fff;color:var(--dark)}

```
/* Header */
#header{
  background:linear-gradient(135deg,var(--h1) 0%,var(--h2) 100%);
  padding:22px 18px 18px;position:sticky;top:0;z-index:10;
  box-shadow:0 2px 12px rgba(75,120,90,.2);
}
#header h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:.04em}
#header p{color:rgba(255,255,255,.85);font-size:11px;margin-top:3px}

/* Tabs */
#tabs{display:flex;background:#fff;border-bottom:1.5px solid var(--border);padding:0 12px}
.tab{flex:1;padding:12px 4px;border:none;background:transparent;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
.tab.active{color:var(--aa);font-weight:700;border-bottom:2.5px solid var(--aa)}

/* Content */
#content{padding:16px}
.section-label{font-size:12px;color:var(--sub);margin-bottom:14px;letter-spacing:.03em}

/* Card */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(70,110,80,.06)}

/* Overview */
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-left{display:flex;align-items:center;gap:12px}
.bat-label{font-weight:700;font-size:15px;color:var(--dark)}
.bat-sub{font-size:12px;color:var(--sub);margin-top:3px}
.stock-num{font-size:26px;font-weight:800;text-align:right}
.stock-unit{font-size:10px;color:var(--sub);text-align:right;margin-top:1px}
.bar-bg{height:6px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-bottom:10px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag-aa{background:rgba(91,138,111,.1);border:1px solid rgba(91,138,111,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--mid)}
.tag-aaa{background:rgba(106,157,191,.1);border:1px solid rgba(106,157,191,.3);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--mid)}
.no-dev{font-size:12px;color:var(--faint)}

/* Inventory */
.inv-row{display:flex;align-items:center;justify-content:space-between}
.inv-controls{display:flex;align-items:center;gap:12px}
.btn-minus{width:36px;height:36px;border-radius:10px;border:1.5px solid rgba(184,106,90,.4);background:rgba(184,106,90,.08);color:var(--danger);font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.btn-plus-aa{width:36px;height:36px;border-radius:10px;border:1.5px solid rgba(91,138,111,.4);background:rgba(91,138,111,.1);color:var(--aa);font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.btn-plus-aaa{width:36px;height:36px;border-radius:10px;border:1.5px solid rgba(106,157,191,.4);background:rgba(106,157,191,.1);color:var(--aaa);font-size:20px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.inv-num{font-size:24px;font-weight:800;min-width:38px;text-align:center}

/* Devices */
.dev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.dev-count{font-size:13px;color:var(--sub)}
.add-btn{background:linear-gradient(135deg,var(--h1),var(--h2));border:none;border-radius:10px;padding:8px 18px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(75,120,90,.25)}
.dev-row{display:flex;align-items:center;justify-content:space-between}
.dev-name{font-weight:700;font-size:15px;color:var(--dark)}
.dev-type{font-size:12px;color:var(--sub);margin-top:2px}
.dev-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);font-size:15px;cursor:pointer}
.empty{text-align:center;padding:52px 16px;color:var(--faint);font-size:14px}
.empty-emoji{font-size:42px;margin-bottom:12px}

/* Edit / Form */
.form-label{font-size:12px;color:var(--sub);margin-bottom:6px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.emoji-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:18px}
.emoji-btn.sel{background:rgba(91,138,111,.15);border:1.5px solid var(--aa)}
.input-field{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--dark);font-size:14px;outline:none;width:100%}
.input-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.done-btn{margin-top:10px;padding:7px 22px;border-radius:10px;border:none;background:var(--aa);color:#fff;font-weight:700;font-size:13px;cursor:pointer}

/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,50,35,.3);z-index:50;align-items:flex-end}
#modal-overlay.open{display:flex}
#modal-box{background:#f7faf7;border-radius:22px 22px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;margin:0 auto;border:1.5px solid var(--border);box-shadow:0 -4px 24px rgba(70,110,80,.12)}
#modal-box h2{font-size:17px;color:var(--dark);margin-bottom:16px;font-weight:700}
.modal-row{display:flex;gap:10px;margin-top:18px}
.modal-cancel{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:14px;cursor:pointer}
.modal-confirm{flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--h1),var(--h2));color:#fff;font-weight:700;font-size:14px;cursor:pointer}

<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:28px">🔋</span>
    <div>
      <h1>充電電池管理</h1>
      <p>Battery Manager</p>
    </div>
  </div>
</div>

<div id="tabs">
  <button class="tab active" onclick="switchTab('overview')">📊 總覽</button>
  <button class="tab" onclick="switchTab('devices')">🔌 裝置</button>
  <button class="tab" onclick="switchTab('inventory')">🗃️ 庫存</button>
</div>

<div id="content"></div>

<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal-box">
    <h2>新增裝置</h2>
    <div class="form-label">選擇圖示</div>
    <div class="emoji-grid" id="modal-icons"></div>
    <input class="input-field" id="modal-name" placeholder="裝置名稱（例：電視遙控器）"/>
    <div class="input-row">
      <select class="input-field" id="modal-type" style="flex:2;width:auto">
        <option value="AA">3號電池 (AA)</option>
        <option value="AAA">4號電池 (AAA)</option>
      </select>
      <input type="number" min="1" max="20" class="input-field" id="modal-count" value="1" style="flex:1;width:auto"/>
      <span style="color:var(--sub);font-size:13px">顆</span>
    </div>
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-confirm" onclick="confirmAdd()">新增</button>
    </div>
  </div>
</div>

<script>
const ICONS = ['📱','🎮','🔦','⌨️','🖱️','🎵','📷','⏰','🔔','🪣','🎯','🚗','💡','🎲','📡'];
const COLORS = { AA:'#5b8a6f', AAA:'#6a9dbf' };
const LABELS = { AA:'3號電池 (AA)', AAA:'4號電池 (AAA)' };

let currentTab = 'overview';
let editingId = null;
let modalIcon = '📱';

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

let inventory = load('battery_inventory',{AA:0,AAA:0});
let devices   = load('battery_devices',[]);

function totalUsed(t){return devices.filter(d=>d.batteryType===t).reduce((s,d)=>s+d.count,0)}
function devsByType(t){return devices.filter(d=>d.batteryType===t)}

function batteryIcon(type,size){
  size=size||32;
  const color=COLORS[type];
  const isSmall=type==='AAA';
  const w=isSmall?16:18, h=isSmall?size*.85:size*.75;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none">
    <rect x="0" y="4" width="${w}" height="${h-4}" rx="3" fill="${color}" opacity=".15" stroke="${color}" stroke-width="1.8"/>
    <rect x="${w/2-4}" y="0" width="8" height="5" rx="1" fill="${color}"/>
    <rect x="3" y="${h*.35}" width="${w-6}" height="${h*.3}" rx="1.5" fill="${color}" opacity=".65"/>
  </svg>`;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── RENDER ──
function render(){
  const c=document.getElementById('content');
  if(currentTab==='overview')  c.innerHTML=renderOverview();
  else if(currentTab==='inventory') c.innerHTML=renderInventory();
  else c.innerHTML=renderDevices();
}

function renderOverview(){
  let html='<div class="section-label">各型號庫存與裝置使用狀況</div>';
  ['AA','AAA'].forEach(type=>{
    const stock=inventory[type]||0;
    const used=totalUsed(type);
    const color=COLORS[type];
    const barW=Math.min(100,stock/(Math.max(stock,used)||1)*100);
    const numColor=stock===0?'var(--danger)':color;
    const list=devsByType(type);
    const tagClass=type==='AA'?'tag-aa':'tag-aaa';
    const tagsHtml=list.length
      ?list.map(d=>`<span class="${tagClass}">${d.icon} ${escHtml(d.name)} ×${d.count}</span>`).join('')
      :'<span class="no-dev">目前無裝置使用此型號</span>';
    const barGrad=type==='AA'
      ?'linear-gradient(90deg,#3d6b54,#5b8a6f)'
      :'linear-gradient(90deg,#4a7d9e,#6a9dbf)';
    html+=`<div class="card">
      <div class="card-top">
        <div class="card-left">
          ${batteryIcon(type,38)}
          <div>
            <div class="bat-label">${LABELS[type]}</div>
            <div class="bat-sub">庫存 <b style="color:${color}">${stock}</b> 顆・裝置用 <b style="color:var(--mid)">${used}</b> 顆</div>
          </div>
        </div>
        <div>
          <div class="stock-num" style="color:${numColor}">${stock}</div>
          <div class="stock-unit">顆</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${barGrad}"></div></div>
      <div class="tags">${tagsHtml}</div>
    </div>`;
  });
  return html;
}

function renderInventory(){
  let html='<div class="section-label">點 +/− 調整庫存數量</div>';
  ['AA','AAA'].forEach(type=>{
    const color=COLORS[type];
    const plusClass=type==='AA'?'btn-plus-aa':'btn-plus-aaa';
    html+=`<div class="card">
      <div class="inv-row">
        <div class="card-left">
          ${batteryIcon(type,42)}
          <div>
            <div class="bat-label">${LABELS[type]}</div>
            <div class="bat-sub" style="margin-top:3px">裝置消耗：${totalUsed(type)} 顆</div>
          </div>
        </div>
        <div class="inv-controls">
          <button class="btn-minus" onclick="changeInv('${type}',-1)">−</button>
          <span class="inv-num" style="color:${color}">${inventory[type]||0}</span>
          <button class="${plusClass}" onclick="changeInv('${type}',1)">+</button>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function renderDevices(){
  let html=`<div class="dev-header">
    <span class="dev-count">${devices.length} 個裝置</span>
    <button class="add-btn" onclick="openModal()">＋ 新增裝置</button>
  </div>`;
  if(!devices.length){
    html+=`<div class="empty"><div class="empty-emoji">🔌</div>還沒有裝置，點右上角新增</div>`;
    return html;
  }
  devices.forEach(d=>{
    const color=COLORS[d.batteryType]||'var(--sub)';
    if(editingId===d.id){
      const iconsHtml=ICONS.map(ic=>
        `<button class="emoji-btn${d.icon===ic?' sel':''}" onclick="setEditIcon(${d.id},'${ic}')">${ic}</button>`
      ).join('');
      html+=`<div class="card">
        <div class="form-label">Emoji 圖示</div>
        <div class="emoji-grid">${iconsHtml}</div>
        <input class="input-field" value="${escHtml(d.name)}" placeholder="裝置名稱" oninput="updateDev(${d.id},'name',this.value)"/>
        <div class="input-row">
          <select class="input-field" style="flex:2;width:auto" onchange="updateDev(${d.id},'batteryType',this.value)">
            <option value="AA"${d.batteryType==='AA'?' selected':''}>3號電池 (AA)</option>
            <option value="AAA"${d.batteryType==='AAA'?' selected':''}>4號電池 (AAA)</option>
          </select>
          <input type="number" min="1" max="20" class="input-field" value="${d.count}" style="flex:1;width:auto" oninput="updateDev(${d.id},'count',parseInt(this.value)||1)"/>
          <span style="color:var(--sub);font-size:13px">顆</span>
        </div>
        <button class="done-btn" onclick="stopEdit()">完成</button>
      </div>`;
    } else {
      html+=`<div class="card">
        <div class="dev-row">
          <div class="card-left">
            <span style="font-size:28px">${d.icon}</span>
            <div>
              <div class="dev-name">${escHtml(d.name)}</div>
              <div class="dev-type"><span style="color:${color}">${LABELS[d.batteryType]}</span> × ${d.count} 顆</div>
            </div>
          </div>
          <div class="dev-actions">
            <button class="icon-btn" onclick="startEdit(${d.id})">✏️</button>
            <button class="icon-btn" onclick="removeDev(${d.id})">🗑️</button>
          </div>
        </div>
      </div>`;
    }
  });
  return html;
}

// ── ACTIONS ──
function switchTab(tab){
  currentTab=tab; editingId=null;
  document.querySelectorAll('.tab').forEach((btn,i)=>{
    btn.classList.toggle('active',['overview','devices','inventory'][i]===tab);
  });
  render();
}
function changeInv(type,delta){
  inventory[type]=Math.max(0,(inventory[type]||0)+delta);
  save('battery_inventory',inventory); render();
}
function startEdit(id){editingId=id;render()}
function stopEdit(){editingId=null;render()}
function updateDev(id,field,val){
  devices=devices.map(d=>d.id===id?{...d,[field]:val}:d);
  save('battery_devices',devices); render();
}
function setEditIcon(id,icon){
  devices=devices.map(d=>d.id===id?{...d,icon}:d);
  save('battery_devices',devices); render();
}
function removeDev(id){
  devices=devices.filter(d=>d.id!==id);
  save('battery_devices',devices); render();
}

// ── MODAL ──
function openModal(){
  modalIcon='📱';
  document.getElementById('modal-name').value='';
  document.getElementById('modal-type').value='AA';
  document.getElementById('modal-count').value=1;
  renderModalIcons();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal()}
function renderModalIcons(){
  document.getElementById('modal-icons').innerHTML=ICONS.map(ic=>
    `<button class="emoji-btn${modalIcon===ic?' sel':''}" onclick="selectModalIcon('${ic}')">${ic}</button>`
  ).join('');
}
function selectModalIcon(ic){modalIcon=ic;renderModalIcons()}
function confirmAdd(){
  const name=document.getElementById('modal-name').value.trim();
  if(!name)return;
  devices.push({
    id:Date.now(), name,
    batteryType:document.getElementById('modal-type').value,
    count:parseInt(document.getElementById('modal-count').value)||1,
    icon:modalIcon
  });
  save('battery_devices',devices);
  closeModal(); switchTab('devices');
}

render();
</script>

</body>
</html>
